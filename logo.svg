<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" width="720" height="400">
  <defs>
    <radialGradient id="avoBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a6b1a"/>
      <stop offset="100%" stop-color="#1a3409"/>
    </radialGradient>
    <radialGradient id="avoGreen" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#5a9e30"/>
      <stop offset="100%" stop-color="#2d5016"/>
    </radialGradient>
    <radialGradient id="avoSkin" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4a7c28"/>
      <stop offset="100%" stop-color="#2d5016"/>
    </radialGradient>
    <radialGradient id="avoPit" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#d4a844"/>
      <stop offset="100%" stop-color="#9b7220"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8a040" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8a040"/>
      <stop offset="100%" stop-color="#c8a040" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="90" cy="100" r="78" fill="url(#avoBg)" filter="url(#shadow)"/>

  <!-- Globe latitude lines -->
  <ellipse cx="90" cy="100" rx="74" ry="74" fill="none" stroke="#c8a040" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="90" cy="82" rx="54" ry="16" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.18"/>
  <ellipse cx="90" cy="100" rx="70" ry="20" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.18"/>
  <ellipse cx="90" cy="118" rx="54" ry="16" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.18"/>
  <!-- Globe vertical arc -->
  <path d="M90 26 Q130 60 130 100 Q130 140 90 174" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.18"/>
  <path d="M90 26 Q50 60 50 100 Q50 140 90 174" fill="none" stroke="#c8a040" stroke-width="0.7" opacity="0.18"/>

  <!-- Avocado fruit body (outer skin) -->
  <ellipse cx="90" cy="108" rx="30" ry="40" fill="url(#avoSkin)" filter="url(#shadow)"/>

  <!-- Avocado inner flesh -->
  <ellipse cx="90" cy="106" rx="22" ry="32" fill="#7ec84a"/>
  <ellipse cx="90" cy="104" rx="16" ry="24" fill="#a8d870"/>

  <!-- Pit -->
  <ellipse cx="90" cy="112" rx="10" ry="13" fill="url(#avoPit)"/>
  <ellipse cx="88" cy="110" rx="3.5" ry="4" fill="rgba(255,255,255,0.2)"/>

  <!-- Leaf left -->
  <path d="M90 68 Q74 44 58 50 Q74 62 90 68Z" fill="#5a9e30"/>
  <path d="M74 56 L90 68" stroke="#3a6b1a" stroke-width="1" opacity="0.5"/>

  <!-- Leaf right -->
  <path d="M90 68 Q106 44 122 50 Q106 62 90 68Z" fill="#4a8c22"/>
  <path d="M106 56 L90 68" stroke="#2d5016" stroke-width="1" opacity="0.5"/>

  <!-- Stem -->
  <line x1="90" y1="68" x2="90" y2="78" stroke="#5a9e30" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Outer ring accent -->
  <circle cx="90" cy="100" r="74" fill="none" stroke="#c8a040" stroke-width="1.5" opacity="0.6"/>

  <!-- Tiny star accent points -->
  <circle cx="90" cy="26" r="2.5" fill="#c8a040"/>
  <circle cx="90" cy="174" r="2.5" fill="#c8a040"/>
  <circle cx="16" cy="100" r="2.5" fill="#c8a040"/>
  <circle cx="164" cy="100" r="2.5" fill="#c8a040"/>

  <!-- IPES wordmark -->
  <text x="195" y="86" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="58" font-weight="300" letter-spacing="8" fill="#1a3409">IPES</text>

  <!-- Gold divider line -->
  <rect x="195" y="96" width="152" height="1.2" fill="url(#goldLine)" rx="1"/>

  <!-- International text -->
  <text x="197" y="116" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="13.5" font-weight="400" letter-spacing="5" fill="#4a7c28">INTERNATIONAL</text>

  <!-- Tagline -->
  <text x="197" y="138" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="13" font-style="italic" font-weight="300" fill="#c8a040" letter-spacing="1.5">From the Highlands · To the World</text>

  <!-- Small fruits row -->
  <!-- Passion fruit dot -->
  <circle cx="200" cy="162" r="7" fill="#8B3AB2"/>
  <text x="211" y="166" font-family="'DM Sans', sans-serif" font-size="9" fill="#7a7a6a" letter-spacing="0.5">Avocado  ·  Ginger  ·  Passion Fruit</text>
  <text x="200" y="178" font-family="'DM Sans', sans-serif" font-size="9" fill="#7a7a6a" letter-spacing="0.5">Dragon Fruit  ·  Banana  ·  Arecanut</text>
</svg>
